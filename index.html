<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institutional Management Portal - Enterprise Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ==========================================================================
       PRIMARY STYLING PATTERNS & RESET CONFIGURATIONS
       ========================================================================== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', sans-serif; 
    }
    
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --sky-500: #0284c7;
      --sky-600: #0369a1;
      --emerald-600: #166534;
      --rose-600: #991b1b;
    }

    body { 
      background: var(--slate-50); 
      color: var(--slate-900); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      overflow-x: hidden;
    }

    .global-logo-header { 
      background: #ffffff; 
      padding: 18px 40px; 
      border-bottom: 1px solid var(--slate-200); 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); 
      width: 100%; 
    }
    .logo-container-flex { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      width: 100%; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    .logo-container-flex img { 
      height: 58px; 
      object-fit: contain; 
      transition: transform 0.2s ease;
    }
    .logo-container-flex img:hover {
      transform: scale(1.03);
    }

    .login-page { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      z-index: 2000; 
      gap: 25px; 
    }
    .login-logo-wrapper { 
      background: white; 
      padding: 20px 40px; 
      border-radius: 20px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); 
      display: flex; 
      gap: 30px; 
      align-items: center; 
    }
    .login-logo-wrapper img { 
      height: 50px; 
      object-fit: contain; 
    }
    .login-container { 
      background: #ffffff; 
      padding: 45px; 
      border-radius: 28px; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
      width: 100%; 
      max-width: 460px; 
      border: 1px solid var(--slate-200); 
    }
    .login-header { 
      text-align: center; 
      margin-bottom: 35px; 
    }
    .login-header h2 { 
      font-size: 26px; 
      font-weight: 800; 
      color: var(--slate-900); 
      letter-spacing: -0.5px;
    }
    .login-header p { 
      color: var(--slate-500); 
      font-size: 14px; 
      margin-top: 8px; 
    }
    .form-group { 
      margin-bottom: 24px; 
    }
    .form-group label { 
      display: block; 
      font-size: 13px; 
      font-weight: 600; 
      margin-bottom: 8px; 
      color: var(--slate-700);
    }
    .input-wrapper { 
      position: relative; 
    }
    .input-wrapper i { 
      position: absolute; 
      left: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--slate-400); 
    }
    .input-wrapper input { 
      width: 100%; 
      padding: 14px 16px 14px 46px; 
      border: 1px solid var(--slate-300); 
      border-radius: 14px; 
      font-size: 14px; 
      outline: none; 
      background: white; 
      transition: all 0.2s;
    }
    .input-wrapper input:focus {
      border-color: var(--sky-500);
      box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
    }
    .submit-btn { 
      width: 100%; 
      padding: 15px; 
      background: var(--slate-900); 
      color: #ffffff; 
      border: none; 
      border-radius: 14px; 
      font-weight: 600; 
      font-size: 15px; 
      cursor: pointer; 
      transition: background 0.2s;
    }
    .submit-btn:hover {
      background: #000000;
    }
    .error-msg { 
      color: #ffffff; 
      background: #ef4444;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px; 
      text-align: center; 
      margin-top: 16px; 
      display: none; 
      font-weight: 500;
    }

    .workspace-wrapper { 
      display: flex; 
      width: 100%; 
      flex-grow: 1; 
    }
    .sidebar { 
      width: 290px; 
      height: calc(100vh - 95px); 
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
      position: sticky; 
      top: 95px; 
      padding: 30px 20px; 
      display: none; 
      flex-direction: column; 
      gap: 35px; 
      box-shadow: 4px 0 25px rgba(0, 0, 0, 0.1); 
      z-index: 1000; 
    }
    .sidebar-brand { 
      color: #ffffff; 
      font-size: 20px; 
      font-weight: 800; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
    }
    .sidebar-brand i { 
      color: #38bdf8; 
    }
    .sidebar-menu { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      list-style: none; 
    }
    .menu-item { 
      display: flex; 
      align-items: center; 
      gap: 14px; 
      padding: 14px 18px; 
      color: #94a3b8; 
      border-radius: 14px; 
      font-weight: 500; 
      font-size: 14px; 
      cursor: pointer; 
      transition: all 0.2s ease-in-out; 
      border-left: 4px solid transparent; 
    }
    .menu-item:hover { 
      color: #ffffff; 
      background: rgba(255, 255, 255, 0.06); 
      transform: translateX(4px); 
      border-left: 4px solid #38bdf8; 
    }
    .menu-item.active { 
      color: #ffffff; 
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.12) 0%, rgba(56, 189, 248, 0) 100%); 
      border-left: 4px solid #38bdf8; 
      font-weight: 600; 
    }

    .main-content { 
      flex-grow: 1; 
      padding: 40px; 
      min-height: calc(100vh - 95px); 
      display: none; 
      overflow-x: hidden; 
    }
    header { 
      margin-bottom: 35px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid var(--slate-200);
      padding-bottom: 20px;
    }
    header h1 { 
      font-size: 28px; 
      font-weight: 800; 
      color: var(--slate-900); 
      letter-spacing: -0.5px;
    }
    .logout-btn { 
      padding: 10px 20px; 
      background: #ef4444; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #dc2626;
    }
    .mode-badge { 
      background: var(--slate-200); 
      color: var(--slate-600); 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-size: 12px; 
      font-weight: 600; 
      margin-left: 14px; 
      cursor: pointer; 
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .data-section { 
      background: #ffffff; 
      padding: 30px; 
      border-radius: 20px; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01); 
      border: 1px solid var(--slate-200); 
      margin-bottom: 30px; 
    }
    .data-section h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-900);
      margin-bottom: 20px;
    }
    .form-grid-layout { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
      gap: 20px; 
      margin-top: 16px; 
    }
    .form-field-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    .form-field-group label { 
      font-size: 13px; 
      font-weight: 600; 
      color: var(--slate-600); 
    }
    .form-field-group input, .form-field-group select, .form-field-group textarea { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid var(--slate-300); 
      border-radius: 10px; 
      outline: none; 
      font-size: 14px; 
      transition: border 0.2s;
    }
    .form-field-group input:focus, .form-field-group select:focus, .form-field-group textarea:focus {
      border-color: var(--sky-500);
    }

    .inline-form { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) 150px; 
      gap: 16px; 
      align-items: end; 
      margin-top: 16px; 
    }
    .inline-form input, .inline-form select { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid var(--slate-300); 
      border-radius: 10px; 
      outline: none; 
      font-size: 14px; 
    }
    
    .action-btn { 
      padding: 13px 28px; 
      background: var(--sky-500); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      font-weight: 600; 
      cursor: pointer; 
      font-size: 14px; 
      transition: background 0.2s;
    }
    .action-btn:hover {
      background: var(--sky-600);
    }
    .action-btn:disabled {
      background: var(--slate-400);
      cursor: not-allowed;
    }
    .search-input-wrapper { 
      margin-top: 24px; 
      max-width: 400px; 
      position: relative; 
    }
    .search-input-wrapper input { 
      width: 100%; 
      padding: 12px 14px 12px 42px; 
      border: 1px solid var(--slate-300); 
      border-radius: 10px; 
      font-size: 14px; 
      outline: none; 
    }
    .search-input-wrapper i { 
      position: absolute; 
      left: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--slate-400); 
      font-size: 15px; 
    }

    .table-container { 
      width: 100%; 
      max-height: 400px; 
      overflow-y: auto; 
      overflow-x: auto; 
      margin-top: 24px; 
      border: 1px solid var(--slate-200); 
      border-radius: 14px; 
      box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.02);
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      text-align: left; 
      font-size: 14px; 
      min-width: 100%; 
    }
    th { 
      background: var(--slate-100); 
      padding: 14px 18px; 
      font-weight: 600; 
      color: var(--slate-600); 
      border-bottom: 2px solid var(--slate-200); 
      position: sticky; 
      top: 0; 
      z-index: 10; 
    }
    td { 
      padding: 14px 18px; 
      border-bottom: 1px solid var(--slate-200); 
      color: var(--slate-700); 
      white-space: nowrap; 
      max-width: 200px; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    tr:hover { 
      background: var(--slate-50); 
    }
    
    .actions-cell-flex { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
    }
    .btn-table-del { 
      background: #fee2e2; 
      color: #b91c1c; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: 600; 
    }
    .btn-table-edit { 
      background: #e0f2fe; 
      color: #0369a1; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: 600; 
    }
    .btn-table-print { 
      background: #f0fdf4; 
      color: #166534; 
      border: 1px solid #bbf7d0; 
      padding: 6px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: 600; 
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
    }

    .tt-grid { 
      display: grid; 
      grid-template-columns: 120px repeat(10, minmax(110px, 1fr)); 
      border: 1px solid var(--slate-300); 
      border-radius: 12px; 
      overflow-x: auto; 
      margin-top: 20px; 
      text-align: center; 
    }
    .tt-header { 
      background: var(--slate-200); 
      font-weight: 700; 
      padding: 16px 8px; 
      font-size: 13px; 
      border-bottom: 2px solid var(--slate-300); 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
    }
    .tt-cell { 
      padding: 16px 8px; 
      background: white; 
      min-height: 100px; 
      border-bottom: 1px solid var(--slate-200); 
      border-right: 1px solid var(--slate-200); 
      font-size: 13px; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      gap: 6px; 
    }
    .tt-day { 
      background: var(--slate-100); 
      font-weight: 700; 
    }
    .tt-break { 
      background: var(--slate-50); 
      color: var(--slate-400); 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .tt-subject-title { 
      font-weight: 700; 
      color: var(--sky-600); 
    }
    .tt-staff-lbl { 
      font-size: 11px; 
      color: var(--slate-500); 
      background: var(--slate-50); 
      padding: 4px; 
      border-radius: 6px; 
      border: 1px dashed var(--slate-200); 
    }

    .student-header-block { 
      display: flex; 
      align-items: center; 
      gap: 30px; 
      border-bottom: 1px solid var(--slate-200); 
      padding-bottom: 30px; 
      margin-bottom: 30px; 
    }
    .student-photo-frame { 
      width: 150px; 
      height: 150px; 
      border-radius: 20px; 
      border: 4px solid var(--sky-500); 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: var(--slate-100); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .student-photo-frame img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    .student-photo-frame i { 
      font-size: 55px; 
      color: var(--slate-400); 
    }
    .student-meta-summary h3 { 
      font-size: 26px; 
      font-weight: 800; 
      color: var(--slate-900); 
    }

    .profile-card { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
      gap: 24px; 
    }
    .info-tile { 
      background: var(--slate-50); 
      border: 1px solid var(--slate-200); 
      padding: 18px; 
      border-radius: 14px; 
    }
    .info-tile span { 
      font-size: 12px; 
      color: var(--slate-500); 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 0.5px;
    }
    .info-tile p { 
      font-size: 16px; 
      color: var(--slate-900); 
      font-weight: 600; 
      margin-top: 6px; 
    }

    .att-list-table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
      background: #ffffff; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid var(--slate-200); 
    }
    .att-status-btn { 
      padding: 8px 20px; 
      border: none; 
      border-radius: 8px; 
      font-weight: 700; 
      cursor: pointer; 
      font-size: 12px; 
      text-transform: uppercase; 
    }
    .att-status-btn.present-state { 
      background: #d1fae5; 
      color: #065f46; 
      border: 1px solid #34d399; 
    }
    .att-status-btn.absent-state { 
      background: #fee2e2; 
      color: #991b1b; 
      border: 1px solid #f87171; 
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .alert-warning-box {
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="global-logo-header" id="global-header" style="display: none;">
    <div class="logo-container-flex">
      <img src="SASTRA_Logo.jpg" alt="SASTRA Logo">
      <img src="Greaves_Logo.jpg" alt="Greaves Logo">
      <img src="Swati_Logo.jpg" alt="Swati Logo">
      <img src="Pygmalion_Foundation_logo.jpg" alt="Pygmalion Foundation Logo">
    </div>
  </div>

  <div class="login-page" id="login-screen">
    <div class="login-logo-wrapper">
      <img src="SASTRA_Logo.jpg" alt="SASTRA Logo">
      <img src="Greaves_Logo.jpg" alt="Greaves Logo">
      <img src="Swati_Logo.jpg" alt="Swati Logo">
      <img src="Pygmalion_Foundation_logo.jpg" alt="Pygmalion Foundation Logo">
    </div>
    <div class="login-container">
      <div class="login-header">
        <h2>Institutional Portal</h2>
        <p>Sign in via Admin, Staff or Student Gateway</p>
      </div>
      <form id="portal-login-form" onsubmit="handleUniversalLogin(event)">
        <div class="form-group">
          <label>User ID / Username</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="admin / Staff ID / Roll No" required>
          </div>
        </div>
        <div class="form-group">
          <label>System Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
          </div>
        </div>
        <button type="submit" class="submit-btn">Authorize & Sign In</button>
        <div class="error-msg" id="error-box">Invalid credentials. Access Denied.</div>
      </form>
    </div>
  </div>

  <div class="workspace-wrapper">
    <nav class="sidebar" id="main-sidebar">
      <div class="sidebar-brand">
        <i class="fa-solid fa-user-gear" id="brand-icon"></i>
        <span id="brand-text">Workspace Desk</span>
      </div>
      <div class="sidebar-menu" id="menu-container"></div>
    </nav>
    <main class="main-content" id="main-content-area">
      <header>
        <div>
          <h1 id="page-title" style="display:inline-block;">Dashboard Matrix</h1>
          <span class="mode-badge" onclick="fetchDataFromGoogleSheets()"><i class="fa-solid fa-cloud-arrow-down"></i> Sync Live Sheets Data</span>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </header>
      <div id="dynamic-tabs-data"></div>
    </main>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8kn3-JapGlhj3cVWEyy_ll3pr_MJ3LlkHxY0bctquKUco7N3HpgcBKfeoOMsN_lgSgQ/exec";
    let activeUserSession = { role: "", uid: "", name: "" };
    let tempBase64Image = "";
    let editingRowIndices = { User_Credentials: -1, Student_Database: -1, Staff_Database: -1, Subject_Database: -1, Subject_Allocation: -1, Daily_Class_Attendance: -1, Legacy_Marks_Ledger: -1, Event_Internship_Attendance: -1 };

    function genId() { return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8); }
    
    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    const studentHeaders = ["Student ID", "Name", "Status", "DOB", "Age", "Phone 1", "Phone 2", "Qualification", "10th%", "12th%", "Accommodation", "Hostel Name", "Room No", "Address", "PhotoData", "Batch", "Record ID"];
    const staffHeaders = ["Staff ID", "Staff Name", "Department", "Mobile No", "Record ID"];
    const subjectHeaders = ["Subject Code", "Subject Name", "Type", "Hours/Week", "Semester", "Record ID"];
    const allocationHeaders = ["Staff ID", "Staff Name", "Subject Code", "Subject Name", "Record ID"];
    const dailyAttendanceHeaders = ["Date", "Subject Code", "Period", "Semester", "Student ID", "Student Name", "Status", "Marked By", "Record ID"];
    const legacyMarksHeaders = ["Subject Code", "Student ID", "Student Name", "CIA 1 (50)", "CIA 2 (50)", "CIA 3 (50)", "Assignment (5)", "Attendance (5)", "Semester (100)", "Total Mark (100)", "Entered By", "Record ID"];
    const eventAttendanceHeaders = ["Date", "Category Type", "Description / Title", "Batch", "Student ID", "Student Name", "Attendance Status", "Record ID"];
    const userHeaders = ["Account Type", "User ID", "Password", "Record ID"];
    const timetableHeaders = ["Day", "Period ID", "Subject Code", "Staff Name", "Record ID"];

    const timeSlots = [
      { id: "1", type: "period", label: "Period 1", time: "8.45 - 9.45" },

    function handleUniversalLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const err = document.getElementById('error-box');

      if (u.toLowerCase() === 'admin' && p === 'admin123') {
        initSession("Admin", "admin", "System Administrator");
        return;
      }

      let credentialsMatrix = JSON.parse(localStorage.getItem("User_Credentials")) || [];
      let foundCred = credentialsMatrix.find(row => row[1] === u && row[2] === p);

      if (foundCred) {
        let role = foundCred[0];
        if (role === "Staff") {
          let staffMatrix = JSON.parse(localStorage.getItem("Staff_Database")) || [];
          let match = staffMatrix.find(r => r[0] === u);
          initSession("Staff", u, match ? match[1] : "Staff Member");
        } else if (role === "Student") {
          let studentMatrix = JSON.parse(localStorage.getItem("Student_Database")) || [];
          let match = studentMatrix.find(r => r[0] === u);
          initSession("Student", u, match ? match[1] : "Student Member");
        }
      } else {
        err.style.display = 'block';
      }
    }

    function initSession(role, uid, name) {
      activeUserSession = { role, uid, name };
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('global-header').style.display = 'block';
      document.getElementById('main-sidebar').style.display = 'flex';
      document.getElementById('main-content-area').style.display = 'block';

      document.getElementById('brand-text').innerText = role + " Desk";
      document.getElementById('brand-icon').className = role === 'Admin' ? 'fa-solid fa-user-gear' : (role === 'Staff' ? 'fa-solid fa-user-tie' : 'fa-solid fa-user-graduate');

      buildSidebarMenus();
      fetchDataFromGoogleSheets();
    }

    function buildSidebarMenus() {
      const container = document.getElementById('menu-container');
      container.innerHTML = "";
      let targetList = activeUserSession.role === 'Admin' ? adminMenus : (activeUserSession.role === 'Staff' ? staffMenus : studentMenus);

      targetList.forEach((m, idx) => {
        let li = document.createElement('li');
        li.className = "menu-item" + (idx === 0 ? " active" : "");
        li.innerHTML = `<i class="fa-solid ${m.icon}"></i> <span>${m.name}</span>`;
        li.onclick = () => switchWorkspaceTab(m.id, li);
        container.appendChild(li);
      });

      const tabsRoot = document.getElementById('dynamic-tabs-data');
      tabsRoot.innerHTML = "";
      targetList.forEach((m, idx) => {
        let div = document.createElement('div');
        div.id = `tab-view-${m.id}`;
        div.className = "tab-content" + (idx === 0 ? " active" : "");
        div.innerHTML = m.html;
        tabsRoot.appendChild(div);
      });

      if (activeUserSession.role === 'Admin') populateSlotSelectors();
      if (activeUserSession.role === 'Staff') populateStaffInputs();
      if (activeUserSession.role === 'Student') renderStudentSelfDashboard();
    }

    function switchWorkspaceTab(tabId, element) {
      document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');

      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(`tab-view-${tabId}`).classList.add('active');

      const currentMenu = [...adminMenus, ...staffMenus, ...studentMenus].find(m => m.id === tabId);
      document.getElementById('page-title').innerText = currentMenu ? currentMenu.name : "Dashboard";
    }

    function syncWithGoogleSheet(tabName, headers, payload, action = "SAVE", recordId = "") {
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tabName, headers, payload, action, recordId })
      }).then(() => console.log(`Sync action finished [${action}] on ${tabName}`))
        .catch(err => console.error("Sheet sync failed: ", err));
    }

    function fetchDataFromGoogleSheets() {
      document.getElementById('page-title').innerText = "Syncing with Cloud Engine...";
      fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
          localStorage.clear();
          
          // Re-map back sheets structural matrices
          if(data["User_Credentials"]) localStorage.setItem("User_Credentials", JSON.stringify(data["User_Credentials"].slice(1)));
          if(data["Staff_Registry"]) localStorage.setItem("Staff_Database", JSON.stringify(data["Staff_Registry"].slice(1)));
          if(data["Subject_Catalog"]) localStorage.setItem("Subject_Database", JSON.stringify(data["Subject_Catalog"].slice(1)));
          if(data["Subject_Allocation_Matrix"]) localStorage.setItem("Subject_Allocation", JSON.stringify(data["Subject_Allocation_Matrix"].slice(1)));
          if(data["Timetable_Matrix"]) localStorage.setItem("Timetable_Database", JSON.stringify(data["Timetable_Matrix"].slice(1)));
          if(data["Legacy_Marks_Ledger"]) localStorage.setItem("Legacy_Marks_Ledger", JSON.stringify(data["Legacy_Marks_Ledger"].slice(1)));
          
          // Consolidate dynamic batch students correctly into unified Student_Database array
          let combinedStudents = [];
          Object.keys(data).forEach(tabKey => {
            if(tabKey.indexOf("Students_") === 0) {
              let rows = data[tabKey].slice(1);
              rows.forEach(r => combinedStudents.push(r));
            }
          });
          if(combinedStudents.length > 0) localStorage.setItem("Student_Database", JSON.stringify(combinedStudents));

          // Consolidate dynamic attendance records into unified local storage matrices
          let combinedClassAtt = [];
          let combinedEventAtt = [];
          Object.keys(data).forEach(tabKey => {
            if(tabKey.indexOf("Class_Att_") === 0) {
              data[tabKey].slice(1).forEach(r => combinedClassAtt.push(r));
            }
            if(tabKey.indexOf("Event_Att_") === 0) {
              data[tabKey].slice(1).forEach(r => combinedEventAtt.push(r));
            }
          });
          localStorage.setItem("Daily_Class_Attendance", JSON.stringify(combinedClassAtt));
          localStorage.setItem("Event_Internship_Attendance", JSON.stringify(combinedEventAtt));

          let activeMenuId = document.querySelector('.menu-item.active span').innerText;
          let matchingMenu = [...adminMenus, ...staffMenus, ...studentMenus].find(m => m.name === activeMenuId);
          document.getElementById('page-title').innerText = matchingMenu ? matchingMenu.name : "Dashboard Matrix";

          renderAllTables();
          if (activeUserSession.role === 'Staff') populateStaffInputs();
        })
        .catch(err => {
          console.error(err);
          document.getElementById('page-title').innerText = "Dashboard Matrix (Offline Mode)";
          renderAllTables();
        });
    }

    function renderAllTables() {
      renderGenericTable("User_Credentials", ["Account Type", "User ID", "Password", "Record ID"]);
      renderGenericTable("Student_Database", studentHeaders);
      renderGenericTable("Staff_Database", staffHeaders);
      renderGenericTable("Subject_Database", subjectHeaders);
      renderGenericTable("Subject_Allocation", allocationHeaders);
      if(activeUserSession.role === 'Admin') renderTimetableGridPane();
    }

    function checkExistingAttendance() {
      const dateInput = document.getElementById('att-date').value;
      const subjectCode = document.getElementById('att-subject').value;
      const period = document.getElementById('att-period').value;
      const warningDiv = document.getElementById('attendance-warning');
      const submitBtn = document.getElementById('submit-attendance-btn');

      if (!dateInput || !subjectCode || !period) return;

      let dailyAttMatrix = JSON.parse(localStorage.getItem("Daily_Class_Attendance")) || [];
      
      // Look for a matching row that checks for Date, Subject AND specific Period Slot
      let duplicateFound = dailyAttMatrix.some(row => {
        let rowDate = row[0];
        let rowSub = row[1];
        let rowPeriod = row[2];
        return (rowDate === dateInput && rowSub === subjectCode && rowPeriod === period);
      });

      if (duplicateFound) {
        warningDiv.style.display = 'block';
        warningDiv.innerText = `Warning: Attendance for ${subjectCode} (${period}) has already been submitted for ${dateInput}! Selection locked.`;
        if(submitBtn) submitBtn.disabled = true;
      } else {
        warningDiv.style.display = 'none';
        if(submitBtn) submitBtn.disabled = false;
      }
    }

    function renderGenericTable(storageKey, headers) {
      const wrapper = document.getElementById(`table-${storageKey}`);
      if (!wrapper) return;

      let matrix = JSON.parse(localStorage.getItem(storageKey)) || [];
      
      if (storageKey === "Student_Database") {
        const query = document.getElementById('student-search-bar')?.value.toLowerCase();
        if (query) {
          matrix = matrix.filter(row => row[0].toLowerCase().includes(query) || row[1].toLowerCase().includes(query));
        }
      }

      let html = `<table><thead><tr>`;
      headers.forEach(h => { if(h !== "PhotoData" && h !== "Record ID") html += `<th>${h}</th>`; });
      if (activeUserSession.role === 'Admin') html += `<th>Management Actions</th>`;
      html += `</tr></thead><tbody>`;

      matrix.forEach((row, rowIdx) => {
        html += `<tr>`;
        headers.forEach((h, colIdx) => {
          if(h !== "PhotoData" && h !== "Record ID") {
            html += `<td>${escapeHtml(row[colIdx])}</td>`;
          }
        });
        if (activeUserSession.role === 'Admin') {
          html += `<td><div class="actions-cell-flex">
            <button class="btn-table-edit" onclick="universalEdit('${storageKey}', ${rowIdx})">Edit</button>
            <button class="btn-table-del" onclick="universalDelete('${storageKey}', ${rowIdx})">Delete</button>
          </div></td>`;
        }
        html += `</tr>`;
      });

      html += `</tbody></table>`;
      wrapper.innerHTML = matrix.length === 0 ? `<p style="color:var(--slate-500);text-align:center;padding:20px;">No institutional data entries found inside local stack.</p>` : html;
    }

    function sheetTabForKey(tblKey, targetRowData) {
      if(tblKey === "User_Credentials") return "User_Credentials";
      if(tblKey === "Staff_Database") return "Staff_Registry";
      if(tblKey === "Subject_Database") return "Subject_Catalog";
      if(tblKey === "Subject_Allocation") return "Subject_Allocation_Matrix";
      if(tblKey === "Student_Database") return `Students_${targetRowData[15].replace(/ /g, "_")}`;
      return null;
    }

    function universalDelete(tblKey, rowIdx) {
      if(!confirm("Are you sure?")) return;
      let matrix = JSON.parse(localStorage.getItem(tblKey));
      let targetRowData = matrix[rowIdx];
      let recordId = targetRowData[targetRowData.length - 1];

      let sheetTab = sheetTabForKey(tblKey, targetRowData);
      if (sheetTab) syncWithGoogleSheet(sheetTab, [], [], "DELETE", recordId);

      matrix.splice(rowIdx, 1);
      localStorage.setItem(tblKey, JSON.stringify(matrix));
      if (editingRowIndices[tblKey] === rowIdx) editingRowIndices[tblKey] = -1;
      renderAllTables();
    }

    function autoCalculateAge() {
      const dob = document.getElementById('std-dob').value;
      if (!dob) return;
      const birthday = new Date(dob);
      const ageDifMs = Date.now() - birthday.getTime();
      const ageDate = new Date(ageDifMs);
      document.getElementById('std-age').value = Math.abs(ageDate.getUTCFullYear() - 1970);
    }

    function toggleHostelFields() {
      const type = document.getElementById('std-accom').value;
      const isHostel = type === "Hostel";
      document.getElementById('std-hname').disabled = !isHostel;
      document.getElementById('std-rno').disabled = !isHostel;
      if(!isHostel) {
        document.getElementById('std-hname').value = "N/A";
        document.getElementById('std-rno').value = "N/A";
      }
    }

    function processImageUpload(inputEl) {
      const file = inputEl.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) { tempBase64Image = e.target.result; };
      reader.readAsDataURL(file);
    }

    function saveUserData() {
      const type = document.getElementById('usr-type').value;
      const uid = document.getElementById('usr-id').value.trim();
      const pass = document.getElementById('usr-pass').value.trim();
      if(!uid || !pass) return alert("Fill all fields");

      let matrix = JSON.parse(localStorage.getItem("User_Credentials")) || [];
      let idx = editingRowIndices["User_Credentials"];

      if(idx > -1) {
        let recId = matrix[idx][3];
        matrix[idx] = [type, uid, pass, recId];
        syncWithGoogleSheet("User_Credentials", userHeaders, matrix[idx], "UPDATE", recId);

    function saveTimetableData() {
      const day = document.getElementById('tt-day').value;

      const staff = document.getElementById('tt-staff-name').value;

      if(!sub || staff === "Not Allocated") return alert("Allocate a valid mapped subject");

      let matrix = JSON.parse(localStorage.getItem("Timetable_Database")) || [];
      let matchIdx = matrix.findIndex(r => r[0] === day && r[1] === slot);

      if(matchIdx > -1) {
        let recId = matrix[matchIdx][4];
        matrix[matchIdx] = [day, slot, sub, staff, recId];
        syncWithGoogleSheet("Timetable_Matrix", timetableHeaders, matrix[matchIdx], "UPDATE", recId);

        let newRow = [day, slot, sub, staff, genId()];

    function renderTimetableGridPane() {
      const pane = document.getElementById('timetable-matrix-view-pane');
      if(!pane) return;

      let matrix = JSON.parse(localStorage.getItem("Timetable_Database")) || [];
      const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

      let html = `<div class="tt-grid"><div class="tt-header">Day / Slots</div>`;
      timeSlots.forEach(s => { html += `<div class="tt-header">${s.label}<br><small>${s.time}</small></div>`; });

      days.forEach(d => {
        html += `<div class="tt-cell tt-day">${d}</div>`;
        timeSlots.forEach(s => {
          if(s.type === 'break') {
            html += `<div class="tt-cell tt-break">${s.label}</div>`;
          } else {
            let cellData = matrix.find(r => r[0] === d && r[1] === s.id);
            if(cellData) {
              html += `<div class="tt-cell"><span class="tt-subject-title">${cellData[2]}</span><span class="tt-staff-lbl">${cellData[3]}</span></div>`;
            } else {
              html += `<div class="tt-cell" style="color:var(--slate-300);">--</div>`;
            }
          }
        });
      });
      html += `</div>`;
      pane.innerHTML = html;
    }

    function loadClassAttendanceGrid() {
      const pane = document.getElementById('class-attendance-grid-pane');
      if(!pane) return;

      let students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      
      // Strict layout filter ensures ALL active array students are present (e.g. 26/26 full headcount load)
      let activeStudents = students.filter(s => s[2] === "Active");

      if(activeStudents.length === 0) {
        pane.innerHTML = `<p style="color:var(--slate-500);">No active student databases inside framework.</p>`;
        return;
      }

      let html = `<table class="att-list-table"><thead><tr><th>Student ID</th><th>Student Name</th><th>Status Toggles</th></tr></thead><tbody>`;
      activeStudents.forEach((st, idx) => {
        html += `<tr>
          <td><strong>${st[0]}</strong></td>
          <td>${st[1]}</td>
          <td>
            <button class="att-status-btn present-state" id="att-btn-${idx}" onclick="toggleAttendanceState(${idx})">Present</button>
            <input type="hidden" id="att-val-${idx}" value="Present" data-sid="${st[0]}" data-sname="${st[1]}" data-batch="${st[15]}">
          </td>
        </tr>`;
      });
      html += `</tbody></table><div style="margin-top:20px;"><button class="action-btn" id="submit-attendance-btn" onclick="submitClassAttendanceGrid()">Submit Roster Log</button></div>`;
      pane.innerHTML = html;
    }

    function toggleAttendanceState(idx) {
      const btn = document.getElementById(`att-btn-${idx}`);
      const val = document.getElementById(`att-val-${idx}`);
      if(val.value === "Present") {
        val.value = "Absent";
        btn.innerText = "Absent";
        btn.className = "att-status-btn absent-state";
      } else {
        val.value = "Present";
        btn.innerText = "Present";
        btn.className = "att-status-btn present-state";
      }
    }

    function submitClassAttendanceGrid() {
      const date = document.getElementById('att-date').value;
      const sub = document.getElementById('att-subject').value;
      const sem = document.getElementById('att-sem').value;
      const period = document.getElementById('att-period').value;

      if(!date || !sub || !period) return alert("Select standard parameter inputs (Date, Mapped Subject, and Hour Period)");

      let localAttendance = JSON.parse(localStorage.getItem("Daily_Class_Attendance")) || [];
      let targetTabName = `Class_Att_${sub}_${sem}`;
      
      let elements = document.querySelectorAll('[id^="att-val-"]');
      elements.forEach(el => {
        let sid = el.getAttribute('data-sid');
        let sname = el.getAttribute('data-sname');
        let status = el.value;
        
        let newRecord = [date, sub, period, sem, sid, sname, status, activeUserSession.name, genId()];
        localAttendance.push(newRecord);

        // Dispatches matrix mapping row directly down to standard core structure layout
        syncWithGoogleSheet(targetTabName, dailyAttendanceHeaders, newRecord, "SAVE");

    }

    function loadMarksLedgerGrid() {
      const sub = document.getElementById('marks-subject-select').value;
      const pane = document.getElementById('marks-ledger-grid-pane');
      if(!sub || !pane) return;

      let students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      let activeStudents = students.filter(s => s[2] === "Active");
      let marksLedger = JSON.parse(localStorage.getItem("Legacy_Marks_Ledger")) || [];

      let html = `<table><thead><tr><th>Student ID</th><th>Name</th><th>CIA 1 (50)</th><th>CIA 2 (50)</th><th>CIA 3 (50)</th><th>Assgn (5)</th><th>Att (5)</th><th>Sem (100)</th></tr></thead><tbody>`;
      
      activeStudents.forEach((st, idx) => {
        let match = marksLedger.find(r => r[0] === sub && r[1] === st[0]) || [];
        html += `<tr>
          <td>${st[0]}</td>
          <td>${st[1]}</td>
          <td><input type="number" id="m-cia1-${idx}" value="${match[3]||0}" style="width:70px;"></td>
          <td><input type="number" id="m-cia2-${idx}" value="${match[4]||0}" style="width:70px;"></td>
          <td><input type="number" id="m-cia3-${idx}" value="${match[5]||0}" style="width:70px;"></td>
          <td><input type="number" id="m-ass-${idx}" value="${match[6]||0}" style="width:70px;"></td>
          <td><input type="number" id="m-att-${idx}" value="${match[7]||0}" style="width:70px;"></td>
          <td><input type="number" id="m-sem-${idx}" value="${match[8]||0}" style="width:70px;" data-sid="${st[0]}" data-sname="${st[1]}"></td>
        </tr>`;
      });

      html += `</tbody></table><div style="margin-top:20px;"><button class="action-btn" onclick="submitMarksLedgerGrid()">Save Marks Ledger</button></div>`;
      pane.innerHTML = html;
    }

    function submitMarksLedgerGrid() {
      const sub = document.getElementById('marks-subject-select').value;
      let elements = document.querySelectorAll('[id^="m-sem-"]');
      let marksLedger = JSON.parse(localStorage.getItem("Legacy_Marks_Ledger")) || [];

      elements.forEach((el, idx) => {
        let sid = el.getAttribute('data-sid');
        let sname = el.getAttribute('data-sname');
        let c1 = parseFloat(document.getElementById(`m-cia1-${idx}`).value) || 0;
        let c2 = parseFloat(document.getElementById(`m-cia2-${idx}`).value) || 0;
        let c3 = parseFloat(document.getElementById(`m-cia3-${idx}`).value) || 0;
        let ass = parseFloat(document.getElementById(`m-ass-${idx}`).value) || 0;
        let att = parseFloat(document.getElementById(`m-att-${idx}`).value) || 0;
        let sem = parseFloat(el.value) || 0;

        let total = ((c1+c2+c3)/3) + ass + att + (sem/2);
        
        let matchIdx = marksLedger.findIndex(r => r[0] === sub && r[1] === sid);
        if(matchIdx > -1) {
          let recId = marksLedger[matchIdx][11];
          marksLedger[matchIdx] = [sub, sid, sname, c1, c2, c3, ass, att, sem, total.toFixed(2), activeUserSession.name, recId];
          syncWithGoogleSheet("Legacy_Marks_Ledger", legacyMarksHeaders, marksLedger[matchIdx], "UPDATE", recId);
        } else {
          let newRow = [sub, sid, sname, c1, c2, c3, ass, att, sem, total.toFixed(2), activeUserSession.name, genId()];
          marksLedger.push(newRow);
          syncWithGoogleSheet("Legacy_Marks_Ledger", legacyMarksHeaders, newRow, "SAVE");
        }
      });

      localStorage.setItem("Legacy_Marks_Ledger", JSON.stringify(marksLedger));
      alert("Marks Ledger synchronized with Google Spreadsheet master dataset.");
    }

    function renderStudentSelfDashboard() {
      const root = document.getElementById('student-profile-root-view');
      const pane = document.getElementById('student-attendance-analytics-pane');
      if(!root) return;

      let students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      let myProfile = students.find(r => r[0] === activeUserSession.uid);

      if(!myProfile) {
        root.innerHTML = `<p>Profile record error inside system memory stack.</p>`;
        return;
      }

      let photoHtml = myProfile[14] ? `<img src="${myProfile[14]}" alt="Photo">` : `<i class="fa-solid fa-user"></i>`;

      root.innerHTML = `
        <div class="student-header-block">
          <div class="student-photo-frame">${photoHtml}</div>
          <div class="student-meta-summary">
            <h3>${myProfile[1]}</h3>
            <p style="color:var(--slate-500);font-weight:600;margin-top:4px;">Roll Number: ${myProfile[0]} | Batch: ${myProfile[15]}</p>
          </div>
        </div>
        <div class="profile-card">
          <div class="info-tile"><span>Status</span><p>${myProfile[2]}</p></div>
          <div class="info-tile"><span>DOB</span><p>${myProfile[3]}</p></div>
          <div class="info-tile"><span>Age</span><p>${myProfile[4]}</p></div>
          <div class="info-tile"><span>Primary Contact</span><p>${myProfile[5]}</p></div>
          <div class="info-tile"><span>Accommodation</span><p>${myProfile[10]}</p></div>
          <div class="info-tile"><span>Hostel Assignment</span><p>${myProfile[11]} [Room ${myProfile[12]}]</p></div>
          <div class="info-tile" style="grid-column: span 2;"><span>Permanent Address</span><p>${myProfile[13]}</p></div>
        </div>
      `;

      // Analytical calculator setup logic engine
      let attendanceRows = JSON.parse(localStorage.getItem("Daily_Class_Attendance")) || [];
      let myAtt = attendanceRows.filter(r => r[4] === activeUserSession.uid);
      
      let total = myAtt.length;
      let present = myAtt.filter(r => r[6] === "Present").length;
      let pct = total > 0 ? ((present/total)*100).toFixed(1) : "100.0";

      pane.innerHTML = `
        <div class="profile-card" style="margin-bottom:30px;">
          <div class="info-tile" style="border-left:5px solid var(--sky-500);"><span>Total Tracked Hours</span><p>${total} Hours</p></div>
          <div class="info-tile" style="border-left:5px solid #16a34a;"><span>Attended Hours</span><p>${present} Hours</p></div>
          <div class="info-tile" style="border-left:5px solid #eab308;"><span>Attendance Percentage</span><p>${pct}%</p></div>
        </div>
        <h3>Detailed Academic Log</h3>
        <table><thead><tr><th>Date</th><th>Subject Code</th><th>Period / Hour</th><th>Roster Status</th></tr></thead><tbody>
          ${myAtt.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2] || "N/A"}</td><td><strong>${r[6]}</strong></td></tr>`).join('')}
        </tbody></table>
      `;
    }

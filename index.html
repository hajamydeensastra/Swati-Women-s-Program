<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institutional Management Portal - Enterprise Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ==========================================================================
       PRIMARY STYLING PATTERNS & RESET CONFIGURATIONS
       ========================================================================== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', sans-serif; 
    }
    
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --sky-500: #0284c7;
      --sky-600: #0369a1;
      --emerald-600: #166534;
      --rose-600: #991b1b;
    }

    body { 
      background: var(--slate-50); 
      color: var(--slate-900); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      overflow-x: hidden;
    }

    /* GLOBAL BRANDING LOGO HEADER SETUP */
    .global-logo-header { 
      background: #ffffff; 
      padding: 18px 40px; 
      border-bottom: 1px solid var(--slate-200); 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); 
      width: 100%; 
    }
    .logo-container-flex { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      width: 100%; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    .logo-container-flex img { 
      height: 58px; 
      object-fit: contain; 
      transition: transform 0.2s ease;
    }
    .logo-container-flex img:hover {
      transform: scale(1.03);
    }

    /* AUTHENTICATION GATEWAY LAYOUT ENGINE */
    .login-page { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      z-index: 2000; 
      gap: 25px; 
    }
    .login-logo-wrapper { 
      background: white; 
      padding: 20px 40px; 
      border-radius: 20px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); 
      display: flex; 
      gap: 30px; 
      align-items: center; 
    }
    .login-logo-wrapper img { 
      height: 50px; 
      object-fit: contain; 
    }
    .login-container { 
      background: #ffffff; 
      padding: 45px; 
      border-radius: 28px; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
      width: 100%; 
      max-width: 460px; 
      border: 1px solid var(--slate-200); 
    }
    .login-header { 
      text-align: center; 
      margin-bottom: 35px; 
    }
    .login-header h2 { 
      font-size: 26px; 
      font-weight: 800; 
      color: var(--slate-900); 
      letter-spacing: -0.5px;
    }
    .login-header p { 
      color: var(--slate-500); 
      font-size: 14px; 
      margin-top: 8px; 
    }
    .form-group { 
      margin-bottom: 24px; 
    }
    .form-group label { 
      display: block; 
      font-size: 13px; 
      font-weight: 600; 
      margin-bottom: 8px; 
      color: var(--slate-700);
    }
    .input-wrapper { 
      position: relative; 
    }
    .input-wrapper i { 
      position: absolute; 
      left: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--slate-400); 
    }
    .input-wrapper input { 
      width: 100%; 
      padding: 14px 16px 14px 46px; 
      border: 1px solid var(--slate-300); 
      border-radius: 14px; 
      font-size: 14px; 
      outline: none; 
      background: white; 
      transition: all 0.2s;
    }
    .input-wrapper input:focus {
      border-color: var(--sky-500);
      box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
    }
    .submit-btn { 
      width: 100%; 
      padding: 15px; 
      background: var(--slate-900); 
      color: #ffffff; 
      border: none; 
      border-radius: 14px; 
      font-weight: 600; 
      font-size: 15px; 
      cursor: pointer; 
      transition: background 0.2s;
    }
    .submit-btn:hover {
      background: #000000;
    }
    .error-msg { 
      color: #ffffff; 
      background: #ef4444;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px; 
      text-align: center; 
      margin-top: 16px; 
      display: none; 
      font-weight: 500;
    }

    /* SYSTEM WORKSPACE LAYOUT WRAPPERS */
    .workspace-wrapper { 
      display: flex; 
      width: 100%; 
      flex-grow: 1; 
    }
    .sidebar { 
      width: 290px; 
      height: calc(100vh - 95px); 
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
      position: sticky; 
      top: 95px; 
      padding: 30px 20px; 
      display: none; 
      flex-direction: column; 
      gap: 35px; 
      box-shadow: 4px 0 25px rgba(0, 0, 0, 0.1); 
      z-index: 1000; 
    }
    .sidebar-brand { 
      color: #ffffff; 
      font-size: 20px; 
      font-weight: 800; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
    }
    .sidebar-brand i { 
      color: #38bdf8; 
    }
    .sidebar-menu { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      list-style: none; 
    }
    .menu-item { 
      display: flex; 
      align-items: center; 
      gap: 14px; 
      padding: 14px 18px; 
      color: #94a3b8; 
      border-radius: 14px; 
      font-weight: 500; 
      font-size: 14px; 
      cursor: pointer; 
      transition: all 0.2s ease-in-out; 
      border-left: 4px solid transparent; 
    }
    .menu-item:hover { 
      color: #ffffff; 
      background: rgba(255, 255, 255, 0.06); 
      transform: translateX(4px); 
      border-left: 4px solid #38bdf8; 
    }
    .menu-item.active { 
      color: #ffffff; 
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.12) 0%, rgba(56, 189, 248, 0) 100%); 
      border-left: 4px solid #38bdf8; 
      font-weight: 600; 
    }

    .main-content { 
      flex-grow: 1; 
      padding: 40px; 
      min-height: calc(100vh - 95px); 
      display: none; 
      overflow-x: hidden; 
    }
    header { 
      margin-bottom: 35px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid var(--slate-200);
      padding-bottom: 20px;
    }
    header h1 { 
      font-size: 28px; 
      font-weight: 800; 
      color: var(--slate-900); 
      letter-spacing: -0.5px;
    }
    .logout-btn { 
      padding: 10px 20px; 
      background: #ef4444; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #dc2626;
    }
    .mode-badge { 
      background: var(--slate-200); 
      color: var(--slate-600); 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-size: 12px; 
      font-weight: 600; 
      margin-left: 14px; 
      cursor: pointer; 
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* DATA LAYOUT CONTAINERS & GRID PANELS */
    .data-section { 
      background: #ffffff; 
      padding: 30px; 
      border-radius: 20px; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01); 
      border: 1px solid var(--slate-200); 
      margin-bottom: 30px; 
    }
    .data-section h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-900);
      margin-bottom: 20px;
    }
    .form-grid-layout { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
      gap: 20px; 
      margin-top: 16px; 
    }
    .form-field-group { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }
    .form-field-group label { 
      font-size: 13px; 
      font-weight: 600; 
      color: var(--slate-600); 
    }
    .form-field-group input, .form-field-group select, .form-field-group textarea { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid var(--slate-300); 
      border-radius: 10px; 
      outline: none; 
      font-size: 14px; 
      transition: border 0.2s;
    }
    .form-field-group input:focus, .form-field-group select:focus, .form-field-group textarea:focus {
      border-color: var(--sky-500);
    }

    .inline-form { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) 150px; 
      gap: 16px; 
      align-items: end; 
      margin-top: 16px; 
    }
    .inline-form input, .inline-form select { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid var(--slate-300); 
      border-radius: 10px; 
      outline: none; 
      font-size: 14px; 
    }
    
    .action-btn { 
      padding: 13px 28px; 
      background: var(--sky-500); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      font-weight: 600; 
      cursor: pointer; 
      font-size: 14px; 
      transition: background 0.2s;
    }
    .action-btn:hover {
      background: var(--sky-600);
    }
    .search-input-wrapper { 
      margin-top: 24px; 
      max-width: 400px; 
      position: relative; 
    }
    .search-input-wrapper input { 
      width: 100%; 
      padding: 12px 14px 12px 42px; 
      border: 1px solid var(--slate-300); 
      border-radius: 10px; 
      font-size: 14px; 
      outline: none; 
    }
    .search-input-wrapper i { 
      position: absolute; 
      left: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: var(--slate-400); 
      font-size: 15px; 
    }

    /* DATA TABLES MANAGEMENT CONFIGURATIONS */
    .table-container { 
      width: 100%; 
      max-height: 400px; 
      overflow-y: auto; 
      overflow-x: auto; 
      margin-top: 24px; 
      border: 1px solid var(--slate-200); 
      border-radius: 14px; 
      box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.02);
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      text-align: left; 
      font-size: 14px; 
      min-width: 100%; 
    }
    th { 
      background: var(--slate-100); 
      padding: 14px 18px; 
      font-weight: 600; 
      color: var(--slate-600); 
      border-bottom: 2px solid var(--slate-200); 
      position: sticky; 
      top: 0; 
      z-index: 10; 
    }
    td { 
      padding: 14px 18px; 
      border-bottom: 1px solid var(--slate-200); 
      color: var(--slate-700); 
      white-space: nowrap; 
      max-width: 200px; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    tr:hover { 
      background: var(--slate-50); 
    }
    
    .actions-cell-flex { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
    }
    .btn-table-del { 
      background: #fee2e2; 
      color: #b91c1c; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: 600; 
    }
    .btn-table-edit { 
      background: #e0f2fe; 
      color: #0369a1; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: 600; 
    }
    .btn-table-print { 
      background: #f0fdf4; 
      color: #166534; 
      border: 1px solid #bbf7d0; 
      padding: 6px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: 600; 
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
    }

    /* HOUR MATRIX TIMETABLE BUILDER */
    .tt-grid { 
      display: grid; 
      grid-template-columns: 120px repeat(10, minmax(110px, 1fr)); 
      border: 1px solid var(--slate-300); 
      border-radius: 12px; 
      overflow-x: auto; 
      margin-top: 20px; 
      text-align: center; 
    }
    .tt-header { 
      background: var(--slate-200); 
      font-weight: 700; 
      padding: 16px 8px; 
      font-size: 13px; 
      border-bottom: 2px solid var(--slate-300); 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
    }
    .tt-cell { 
      padding: 16px 8px; 
      background: white; 
      min-height: 100px; 
      border-bottom: 1px solid var(--slate-200); 
      border-right: 1px solid var(--slate-200); 
      font-size: 13px; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      gap: 6px; 
    }
    .tt-day { 
      background: var(--slate-100); 
      font-weight: 700; 
    }
    .tt-break { 
      background: var(--slate-50); 
      color: var(--slate-400); 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .tt-subject-title { 
      font-weight: 700; 
      color: var(--sky-600); 
    }
    .tt-staff-lbl { 
      font-size: 11px; 
      color: var(--slate-500); 
      background: var(--slate-50); 
      padding: 4px; 
      border-radius: 6px; 
      border: 1px dashed var(--slate-200); 
    }

    /* STUDENT DESK PROFILE VIEWER */
    .student-header-block { 
      display: flex; 
      align-items: center; 
      gap: 30px; 
      border-bottom: 1px solid var(--slate-200); 
      padding-bottom: 30px; 
      margin-bottom: 30px; 
    }
    .student-photo-frame { 
      width: 150px; 
      height: 150px; 
      border-radius: 20px; 
      border: 4px solid var(--sky-500); 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: var(--slate-100); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .student-photo-frame img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    .student-photo-frame i { 
      font-size: 55px; 
      color: var(--slate-400); 
    }
    .student-meta-summary h3 { 
      font-size: 26px; 
      font-weight: 800; 
      color: var(--slate-900); 
    }

    .profile-card { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
      gap: 24px; 
    }
    .info-tile { 
      background: var(--slate-50); 
      border: 1px solid var(--slate-200); 
      padding: 18px; 
      border-radius: 14px; 
    }
    .info-tile span { 
      font-size: 12px; 
      color: var(--slate-500); 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 0.5px;
    }
    .info-tile p { 
      font-size: 16px; 
      color: var(--slate-900); 
      font-weight: 600; 
      margin-top: 6px; 
    }

    .att-list-table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
      background: #ffffff; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid var(--slate-200); 
    }
    .att-status-btn { 
      padding: 8px 20px; 
      border: none; 
      border-radius: 8px; 
      font-weight: 700; 
      cursor: pointer; 
      font-size: 12px; 
      text-transform: uppercase; 
    }
    .att-status-btn.present-state { 
      background: #d1fae5; 
      color: #065f46; 
      border: 1px solid #34d399; 
    }
    .att-status-btn.absent-state { 
      background: #fee2e2; 
      color: #991b1b; 
      border: 1px solid #f87171; 
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <!-- GLOBAL INSTITUTION HEADER BRANDS -->
  <div class="global-logo-header" id="global-header" style="display: none;">
    <div class="logo-container-flex">
      <img src="SASTRA_Logo.jpg" alt="SASTRA Logo">
      <img src="Greaves_Logo.jpg" alt="Greaves Logo">
      <img src="Swati_Logo.jpg" alt="Swati Logo">
      <img src="Pygmalion_Foundation_logo.jpg" alt="Pygmalion Foundation Logo">
    </div>
  </div>

  <!-- STAGE 1: CREDENTIALS AUTH SCREEN -->
  <div class="login-page" id="login-screen">
    <div class="login-logo-wrapper">
      <img src="SASTRA_Logo.jpg" alt="SASTRA Logo">
      <img src="Greaves_Logo.jpg" alt="Greaves Logo">
      <img src="Swati_Logo.jpg" alt="Swati Logo">
      <img src="Pygmalion_Foundation_logo.jpg" alt="Pygmalion Foundation Logo">
    </div>
    <div class="login-container">
      <div class="login-header">
        <h2>Institutional Portal</h2>
        <p>Sign in via Admin, Staff or Student Gateway</p>
      </div>
      <form id="portal-login-form" onsubmit="handleUniversalLogin(event)">
        <div class="form-group">
          <label>User ID / Username</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="admin / Staff ID / Roll No" required>
          </div>
        </div>
        <div class="form-group">
          <label>System Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
          </div>
        </div>
        <button type="submit" class="submit-btn">Authorize & Sign In</button>
        <div class="error-msg" id="error-box">Invalid credentials. Access Denied.</div>
      </form>
    </div>
  </div>

  <!-- STAGE 2: WORKSPACE GRID OPERATIONS -->
  <div class="workspace-wrapper">
    <nav class="sidebar" id="main-sidebar">
      <div class="sidebar-brand">
        <i class="fa-solid fa-user-gear" id="brand-icon"></i>
        <span id="brand-text">Workspace Desk</span>
      </div>
      <div class="sidebar-menu" id="menu-container"></div>
    </nav>

    <main class="main-content" id="main-content-area">
      <header>
        <div>
          <h1 id="page-title" style="display:inline-block;">Dashboard Matrix</h1>
          <span class="mode-badge" onclick="fetchDataFromGoogleSheets()"><i class="fa-solid fa-cloud-arrow-down"></i> Sync Live Sheets Data</span>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </header>
      <div id="dynamic-tabs-data"></div>
    </main>
  </div>

  <!-- INTERNAL INTERFACE RUNTIME SCRIPTS -->
  <script>
    // --- APP SCRIPT HOOK ---
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8kn3-JapGlhj3cVWEyy_ll3pr_MJ3LlkHxY0bctquKUco7N3HpgcBKfeoOMsN_lgSgQ/exec";

    let activeUserSession = { role: "", uid: "", name: "" };
    let tempBase64Image = ""; 
    
    let editingRowIndices = {
      User_Credentials: -1, Student_Database: -1, Staff_Database: -1,
      Subject_Database: -1, Subject_Allocation: -1, Daily_Class_Attendance: -1,
      Legacy_Marks_Ledger: -1, Event_Internship_Attendance: -1
    };

    // Generates a unique id for every saved row. Every table now carries this as its LAST
    // column ("Record ID") so Edit/Update and Delete can target the exact row instead of the
    // old approach of guessing a "unique" visible column, which could match multiple rows.
    function genId() {
      return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
    }

    // Escapes user-entered text before it is injected into innerHTML, to stop stored data
    // (student names, addresses, subject names, etc.) from being able to break out and run
    // as HTML/script when it is rendered back into a table.
    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const studentHeaders = ["Student ID", "Name", "Status", "DOB", "Age", "Phone 1", "Phone 2", "Qualification", "10th%", "12th%", "Accommodation", "Hostel Name", "Room No", "Address", "PhotoData", "Batch", "Record ID"];
    const staffHeaders = ["Staff ID", "Staff Name", "Department", "Mobile No", "Record ID"];
    const subjectHeaders = ["Subject Code", "Subject Name", "Type", "Hours/Week", "Semester", "Record ID"];
    const allocationHeaders = ["Staff ID", "Staff Name", "Subject Code", "Subject Name", "Record ID"];

    // Core execution algorithms, data formatting, sync loops continue here...
    function fetchDataFromGoogleSheets() {
      if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_GOOGLE_SCRIPT")) return;
      const badge = document.querySelector('.mode-badge');
      if (badge) badge.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i> Syncing...';

      fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
          if (data["Staff_Registry"]) localStorage.setItem("Staff_Database", JSON.stringify(data["Staff_Registry"]));
          if (data["Subject_Catalog"]) localStorage.setItem("Subject_Database", JSON.stringify(data["Subject_Catalog"]));
          if (data["Subject_Allocation_Matrix"]) localStorage.setItem("Subject_Allocation", JSON.stringify(data["Subject_Allocation_Matrix"]));
          if (data["User_Credentials"]) localStorage.setItem("User_Credentials", JSON.stringify(data["User_Credentials"]));

          let masterStudents = [studentHeaders];
          Object.keys(data).forEach(sheetName => {
            if (sheetName.indexOf("Students_") === 0) {
              var rows = data[sheetName];
              for(var r=1; r<rows.length; r++) masterStudents.push(rows[r]);
            }
          });
          if(masterStudents.length > 1) localStorage.setItem("Student_Database", JSON.stringify(masterStudents));

          let masterDailyAtt = [];
          let masterEventAtt = [];
          Object.keys(data).forEach(sheetName => {
            if (sheetName.indexOf("Class_Att_") === 0) {
              var rows = data[sheetName];
              for(var r=1; r<rows.length; r++) masterDailyAtt.push(rows[r]);
            }
            if (sheetName.indexOf("Event_Att_") === 0) {
              var rows = data[sheetName];
              for(var r=1; r<rows.length; r++) masterEventAtt.push(rows[r]);
            }
          });
          localStorage.setItem("Daily_Class_Attendance", JSON.stringify(masterDailyAtt));
          localStorage.setItem("Event_Internship_Attendance", JSON.stringify(masterEventAtt));

          // FIX: previously Legacy_Marks_Ledger was saved TO Sheets but never read back, so
          // entered marks disappeared on refresh and never reached other devices at all.
          if (data["Legacy_Marks_Ledger"]) {
            let marksRows = data["Legacy_Marks_Ledger"];
            localStorage.setItem("Legacy_Marks_Ledger", JSON.stringify(marksRows.slice(1)));
          }

          // FIX: the Timetable was previously kept ONLY in the admin's own browser localStorage
          // and never synced, so staff/students never actually saw it and it was lost if that
          // browser's storage was cleared.
          if (data["Timetable_Matrix"]) {
            let ttRows = data["Timetable_Matrix"];
            let matrixObj = {};
            for (let r = 1; r < ttRows.length; r++) {
              const day = ttRows[r][0], periodId = ttRows[r][1], subCode = ttRows[r][2], staffName = ttRows[r][3], recId = ttRows[r][4];
              if (!matrixObj[day]) matrixObj[day] = {};
              matrixObj[day][periodId] = { subCode: subCode, staffName: staffName, recordId: recId };
            }
            localStorage.setItem("Timetable_Matrix", JSON.stringify(matrixObj));
          }

          renderAllTables();
          if (badge) badge.innerHTML = '<i class="fa-solid fa-cloud"></i> Hybrid Engine Enabled';
        })
        .catch(err => {
          if (badge) badge.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Offline Mode';
        });
    }

    function syncWithGoogleSheet(tabName, headers, payload, action = "SAVE", rowId = "") {
      if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_GOOGLE_SCRIPT")) return;
      
      const packet = { tabName: tabName, headers: headers, payload: payload, action: action, rowId: rowId };
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(packet),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      })
      .then(res => res.json())
      .then(() => fetchDataFromGoogleSheets())
      .catch(err => console.error("Cloud Synchro Error:", err));
    }

    function loadEventBatchStudents() {
      const selectedBatch = document.getElementById('evt-batch-select').value;
      const wrapper = document.getElementById('event-student-list-wrapper');
      if(!wrapper || !selectedBatch) return;

      const students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      let filteredStudents = students.filter((row, idx) => idx > 0 && row[15] === selectedBatch);

      if(filteredStudents.length === 0) {
        wrapper.innerHTML = `<p style="color:#ef4444;">No student records found for batch '${selectedBatch}'.</p>`;
        return;
      }

      let code = `<table class="att-list-table"><thead><tr><th>Roll No</th><th>Name</th><th>Status</th></tr></thead><tbody>`;
      filteredStudents.forEach(student => {
        code += `<tr><td><strong>${escapeHtml(student[0])}</strong></td><td>${escapeHtml(student[1])}</td>
                  <td><button type="button" class="att-status-btn present-state" id="evt-row-btn-${student[0]}" onclick="toggleEventAttendanceRow('${student[0]}')">Present</button></td></tr>`;
      });
      code += `</tbody></table>`;
      wrapper.innerHTML = code;
    }

    function toggleEventAttendanceRow(stdId) {
      const btn = document.getElementById(`evt-row-btn-${stdId}`);
      if(btn.classList.contains('present-state')) {
        btn.classList.remove('present-state'); btn.classList.add('absent-state'); btn.innerText = "Absent";
      } else {
        btn.classList.remove('absent-state'); btn.classList.add('present-state'); btn.innerText = "Present";
      }
    }

    function saveEventAttendanceData() {
      const date = document.getElementById('evt-date').value;
      const type = document.getElementById('evt-type').value;
      const batch = document.getElementById('evt-batch-select').value;
      const desc = document.getElementById('evt-desc').value.trim();

      if(!batch || !desc || !date) return alert("Select batch, date and context description.");

      const students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      let filteredStudents = students.filter((row, idx) => idx > 0 && row[15] === batch);
      let eventLedger = JSON.parse(localStorage.getItem("Event_Internship_Attendance")) || [];

      const customSheetTabName = "Event_Att_" + batch.replace("-", "_");

      filteredStudents.forEach(student => {
        const stdId = student[0];
        const btn = document.getElementById(`evt-row-btn-${stdId}`);
        let status = (btn && btn.classList.contains('absent-state')) ? "Absent" : "Present";

        // FIX: resubmitting the same event log for a student previously always appended a
        // fresh duplicate row with no de-duplication at all.
        let existingIdx = eventLedger.findIndex(r => r[0] === date && r[2] === desc && r[4] === stdId);
        let recId = existingIdx !== -1 ? eventLedger[existingIdx][eventLedger[existingIdx].length - 1] : genId();
        let freshLog = [date, type, desc, batch, stdId, student[1], status, recId];

        if (existingIdx !== -1) {
          eventLedger[existingIdx] = freshLog;
          syncWithGoogleSheet(customSheetTabName, eventAttendanceHeaders, freshLog, "UPDATE", recId);
        } else {
          eventLedger.push(freshLog);
          syncWithGoogleSheet(customSheetTabName, eventAttendanceHeaders, freshLog, "SAVE");
        }
      });

      localStorage.setItem("Event_Internship_Attendance", JSON.stringify(eventLedger));
      alert("Event / Internship Attendance committed successfully!");
      prepEventAttendanceTab();
      renderAllTables();
    }

    function saveLegacyMarksLedger() {
      const subCode = document.getElementById('leg-sub-code').value;
      if(!subCode) return alert("Select subject context.");

      const students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      let db = JSON.parse(localStorage.getItem("Legacy_Marks_Ledger")) || [];

      for(let i = 1; i < students.length; i++) {
        const id = students[i][0];
        const totalEl = document.getElementById(`l-total-${id}`);
        if (!totalEl) continue;

        let freshRow = [subCode, id, students[i][1], parseFloat(document.getElementById(`l-cia1-${id}`).value)||0, parseFloat(document.getElementById(`l-cia2-${id}`).value)||0, parseFloat(document.getElementById(`l-cia3-${id}`).value)||0, parseFloat(document.getElementById(`l-assg-${id}`).value)||0, parseFloat(document.getElementById(`l-attn-${id}`).value)||0, parseFloat(document.getElementById(`l-sem-${id}`).value)||0, parseFloat(totalEl.value)||0, activeUserSession.uid];

        // FIX: previously this always appended a new row, so re-entering / correcting marks
        // for the same subject+student piled up duplicate mark rows forever.
        let existingIdx = db.findIndex(r => r[0] === subCode && r[1] === id);
        let recId = existingIdx !== -1 ? db[existingIdx][db[existingIdx].length - 1] : genId();
        freshRow.push(recId);

        if (existingIdx !== -1) {
          db[existingIdx] = freshRow;
          syncWithGoogleSheet("Legacy_Marks_Ledger", legacyMarksHeaders, freshRow, "UPDATE", recId);
        } else {
          db.push(freshRow);
          syncWithGoogleSheet("Legacy_Marks_Ledger", legacyMarksHeaders, freshRow, "SAVE");
        }
      }

      localStorage.setItem("Legacy_Marks_Ledger", JSON.stringify(db));
      alert("Marks saved successfully!");
      renderAllTables();
    }

    // Looks for an existing row with the same natural-key value (e.g. same Student ID) so
    // duplicate records can't silently pile up. Returns -1 if there's no clash.
    function findDuplicateIndex(tblKey, idColIndex, idValue) {
      let db = JSON.parse(localStorage.getItem(tblKey)) || [];
      for (let i = 1; i < db.length; i++) {
        if (db[i][idColIndex] === idValue) return i;
      }
      return -1;
    }

    // Generic add-or-update: if editingRowIndices[tblKey] points at a real row, this UPDATEs
    // that row in place (both locally and in the Google Sheet, matched by Record ID). Otherwise
    // it appends a brand new row with a freshly generated Record ID. This replaces the old
    // behaviour where "editing" a row just relabeled a button but Save always appended a
    // duplicate row with no way to actually overwrite the original.
    function commitRecord(tblKey, headers, rowData, sheetTabResolver) {
      let db = JSON.parse(localStorage.getItem(tblKey)) || [headers];
      let editIdx = editingRowIndices[tblKey];

      if (editIdx !== undefined && editIdx !== -1 && db[editIdx]) {
        let existingId = db[editIdx][db[editIdx].length - 1];
        let fullRow = rowData.concat([existingId]);
        db[editIdx] = fullRow;
        localStorage.setItem(tblKey, JSON.stringify(db));
        syncWithGoogleSheet(sheetTabResolver(fullRow), headers, fullRow, "UPDATE", existingId);
      } else {
        let fullRow = rowData.concat([genId()]);
        db.push(fullRow);
        localStorage.setItem(tblKey, JSON.stringify(db));
        syncWithGoogleSheet(sheetTabResolver(fullRow), headers, fullRow, "SAVE");
      }
      editingRowIndices[tblKey] = -1;
      renderAllTables();
    }

      if(!uid || !pass) return alert("Fill all account data.");

      const dupIdx = findDuplicateIndex("User_Credentials", 1, uid);
      if (dupIdx !== -1 && dupIdx !== editingRowIndices.User_Credentials) {
        return alert("This User ID already exists. Choose a different ID, or use Edit on the existing account.");
      }

      // FIX: this previously only ever saved to localStorage, so accounts created on one
      // browser could never log in from any other device -- they never reached the Sheet.
      commitRecord("User_Credentials", userHeaders, [type, uid, pass], () => "User_Credentials");

      document.getElementById('usr-id').value = "";
      document.getElementById('usr-pass').value = "";
      document.getElementById('btn-usr').innerText = "Create Account";
    }

      document.getElementById('btn-stf').innerText = "Save Entry";
    }

    function saveSubjectData() {
      const code = document.getElementById('sub-code').value.trim();
      const name = document.getElementById('sub-name').value.trim();
      const type = document.getElementById('sub-type').value;
      const hours = document.getElementById('sub-hours').value.trim();
      const sem = document.getElementById('sub-sem').value;
      if(!code || !name) return alert("Subject Code and Name are mandatory.");

      const dupIdx = findDuplicateIndex("Subject_Database", 0, code);
      if (dupIdx !== -1 && dupIdx !== editingRowIndices.Subject_Database) {
        return alert("This Subject Code already exists. Choose a different code, or use Edit on the existing subject.");
      }

      commitRecord("Subject_Database", subjectHeaders, [code, name, type, hours, sem], () => "Subject_Catalog");

      document.getElementById('sub-code').value = ""; document.getElementById('sub-name').value = "";
      document.getElementById('sub-hours').value = "";
      document.getElementById('btn-sub').innerText = "Save Entry";
    }

    function saveSubjectAllocation() {
      const staffEl = document.getElementById('alt-stf-id');
      const subEl = document.getElementById('alt-sub-code');
      if(!staffEl.value || !subEl.value) return alert("Select both a staff member and a subject.");

      const rowData = [staffEl.value, staffEl.options[staffEl.selectedIndex].getAttribute('data-name'), subEl.value, subEl.options[subEl.selectedIndex].getAttribute('data-name')];

      let db = JSON.parse(localStorage.getItem("Subject_Allocation")) || [allocationHeaders];
      let dupIdx = -1;
      for(let i = 1; i < db.length; i++) { if(db[i][0] === rowData[0] && db[i][2] === rowData[2]) { dupIdx = i; break; } }
      if (dupIdx !== -1 && dupIdx !== editingRowIndices.Subject_Allocation) {
        return alert("This staff member is already allocated to this subject.");
      }

      commitRecord("Subject_Allocation", allocationHeaders, rowData, () => "Subject_Allocation_Matrix");
      document.getElementById('btn-alt').innerText = "Allocate Subject";
    }

    function saveDailyClassAttendance() {
      const attDate = document.getElementById('cls-date').value;
      const subCode = document.getElementById('cls-sub-code').value;
      const semester = document.getElementById('cls-sem').value;

      if(!subCode) return alert("Select subject layout.");
      if(!attDate) return alert("Select a date.");

      const students = JSON.parse(localStorage.getItem("Student_Database")) || [];
      let attendanceLedger = JSON.parse(localStorage.getItem("Daily_Class_Attendance")) || [];
      const dynamicAttTabName = "Class_Att_" + subCode + "_" + semester;

      for(let i = 1; i < students.length; i++) {
        const stdId = students[i][0];
        const btn = document.getElementById(`att-row-btn-${stdId}`);
        let status = (btn && btn.classList.contains('absent-state')) ? "Absent" : "Present";

        // Re-submitting attendance for the same date+subject+student updates the row locally
        // too (previously this always pushed a fresh duplicate into local storage even though
        // the backend was smart enough to update the Sheet row in place).
        let existingIdx = attendanceLedger.findIndex(r => r[0] === attDate && r[1] === subCode && r[3] === stdId);
        let recId = existingIdx !== -1 ? attendanceLedger[existingIdx][attendanceLedger[existingIdx].length - 1] : genId();

        let freshRow = [attDate, subCode, semester, stdId, students[i][1], status, activeUserSession.uid, recId];
        if (existingIdx !== -1) attendanceLedger[existingIdx] = freshRow; else attendanceLedger.push(freshRow);
        syncWithGoogleSheet(dynamicAttTabName, dailyAttendanceHeaders, freshRow, "SAVE");
      }

      localStorage.setItem("Daily_Class_Attendance", JSON.stringify(attendanceLedger));
      alert("Attendance records securely archived!");
      generateSimpleAttendanceList();
      renderAllTables();
    }

    function autoCalculateAge() {
      const dobValue = document.getElementById('std-dob').value;
      if (!dobValue) return;
      let age = new Date().getFullYear() - new Date(dobValue).getFullYear();
      document.getElementById('std-age').value = age >= 0 ? age : 0;
    }

    function toggleHostelFields() {
      const type = document.getElementById('std-accom').value;
      document.getElementById('std-hname').disabled = (type !== 'Hostel');
      document.getElementById('std-rno').disabled = (type !== 'Hostel');
    }

    // Real header labels for the tables that don't carry their own header row locally
    // (previously these three rendered literal placeholder text "Col 1", "Col 2"... instead
    // of actual column names).
    const headerlessTableHeaders = {
      Daily_Class_Attendance: dailyAttendanceHeaders,
      Legacy_Marks_Ledger: legacyMarksHeaders,
      Event_Internship_Attendance: eventAttendanceHeaders
    };
    const editableTables = ["User_Credentials", "Student_Database", "Staff_Database", "Subject_Database", "Subject_Allocation"];

    // Resolves which Google Sheet tab a given local row belongs to. Used for both UPDATE and
    // DELETE so a row is always targeted at the correct tab (previously Subject_Allocation,
    // User_Credentials, Daily_Class_Attendance, Legacy_Marks_Ledger and
    // Event_Internship_Attendance all silently fell through to a nonexistent "General_Data" tab).
    function sheetTabForKey(tblKey, rowData) {
      switch (tblKey) {
        case "Student_Database": return "Students_" + (rowData[15] || "2026-2028").replace("-", "_");
        case "Staff_Database": return "Staff_Registry";
        case "Subject_Database": return "Subject_Catalog";
        case "Subject_Allocation": return "Subject_Allocation_Matrix";
        case "User_Credentials": return "User_Credentials";
        case "Daily_Class_Attendance": return "Class_Att_" + rowData[1] + "_" + rowData[2];
        case "Legacy_Marks_Ledger": return "Legacy_Marks_Ledger";
        case "Event_Internship_Attendance": return "Event_Att_" + (rowData[3] || "").replace("-", "_");
        default: return null;
      }
    }

    function renderAllTables() {
      let activeTables = [];
      if(activeUserSession.role === "ADMIN") {
        activeTables = ["User_Credentials", "Student_Database", "Staff_Database", "Subject_Database", "Subject_Allocation", "Event_Internship_Attendance:table-Event_Internship_Attendance"];
      } else if(activeUserSession.role === "STAFF") {
        activeTables = ["Daily_Class_Attendance:table-Daily_Attendance_Ledger", "Legacy_Marks_Ledger:table-Legacy_Marks_Ledger"];
      } else return;
      
      activeTables.forEach(item => {
        let parts = item.split(':'); let tblKey = parts[0]; let targetId = parts[1] || "table-" + tblKey;
        const box = document.getElementById(targetId); if(!box) return;

        let matrix = JSON.parse(localStorage.getItem(tblKey)) || [];
        let headerless = (tblKey === "Daily_Class_Attendance" || tblKey === "Legacy_Marks_Ledger" || tblKey === "Event_Internship_Attendance");
        let startIdx = headerless ? 0 : 1;

        if(matrix.length <= startIdx) {
          box.innerHTML = `<p style="color:#94a3b8; font-size:13px;">No local engine dataset ledger found.</p>`; return;
        }

        // Row indices to actually display. Student_Database supports the search bar
        // (previously the search box existed in the UI but did nothing at all).
        let rowIndices = [];
        for (let r = startIdx; r < matrix.length; r++) rowIndices.push(r);

        if (tblKey === "Student_Database") {
          const searchEl = document.getElementById('student-search-bar');
          const q = searchEl ? searchEl.value.trim().toLowerCase() : "";
          if (q) {
            rowIndices = rowIndices.filter(r => {
              const row = matrix[r];
              return String(row[0] || "").toLowerCase().includes(q) || String(row[1] || "").toLowerCase().includes(q);
            });
          }
        }

        if (rowIndices.length === 0) {
          box.innerHTML = `<p style="color:#94a3b8; font-size:13px;">No matching records found.</p>`; return;
        }

        let code = "<table><thead><tr>";
        // FIX: previously headerless tables rendered literal placeholder text "Col 1".."Col 10"
        // instead of real column names.
        let headersToUse = headerless ? headerlessTableHeaders[tblKey] : matrix[0];
        headersToUse.slice(0, -1).forEach(h => code += `<th>${escapeHtml(h)}</th>`); // last col is the internal Record ID, hidden
        code += "<th>Actions</th></tr></thead><tbody>";

        rowIndices.forEach(r => {
          code += "<tr>";
          matrix[r].slice(0, -1).forEach(cell => code += `<td>${escapeHtml(cell)}</td>`);

          let printBtn = (tblKey === "Student_Database") ? `<button class="btn-table-print" onclick="triggerProfessionalApplicationPrint(${r})">Print</button>` : "";
          let editBtn = editableTables.includes(tblKey) ? `<button class="btn-table-edit" onclick="initiateRowModification('${tblKey}', ${r})">Edit</button>` : "";
          code += `<td><div class="actions-cell-flex">
            ${editBtn}
            <button class="btn-table-del" onclick="triggerUniversalDelete('${tblKey}', ${r})">Delete</button>
            ${printBtn}
          </div></td></tr>`;
        });
        code += "</tbody></table>"; box.innerHTML = code;
      });
    }

    function triggerUniversalDelete(tblKey, rowIdx) {
      if(!confirm("Are you sure?")) return;
      let matrix = JSON.parse(localStorage.getItem(tblKey));
      let targetRowData = matrix[rowIdx];
      let recordId = targetRowData[targetRowData.length - 1];

      // FIX: previously deletion matched by the VALUE of columns 0/1/3/4 on the backend, which
      // for tables like Daily_Class_Attendance (column 0 = Date, shared by every student's row
      // that day) could delete every other student's attendance for that date too. Matching by
      // the unique Record ID removes that risk entirely.
      let sheetTab = sheetTabForKey(tblKey, targetRowData);
      if (sheetTab) syncWithGoogleSheet(sheetTab, [], [], "DELETE", recordId);

      matrix.splice(rowIdx, 1);
      localStorage.setItem(tblKey, JSON.stringify(matrix));
      if (editingRowIndices[tblKey] === rowIdx) editingRowIndices[tblKey] = -1;
      renderAllTables();
    }

    function handleLogout() {
      activeUserSession = { role: "", uid: "", name: "" };
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('global-header').style.display = 'none';
      document.getElementById('main-sidebar').style.display = 'none';
      document.getElementById('main-content-area').style.display = 'none';
    }

    window.onload = function() {
      fetchDataFromGoogleSheets();
      setInterval(fetchDataFromGoogleSheets, 15000);
    };
  </script>
</body>
